<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPPG GUNUNGPRING 001</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
    background:linear-gradient(135deg,#00b14f,#00d563);
    padding:20px;
}

h1{
    text-align:center;
    color:white;
    margin-bottom:20px;
    font-weight:600;
}

/* FORM */
.form-box{
    background:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.form-box input,
.form-box select{
    width:100%;
    padding:8px;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid #ddd;
}

.form-box button{
    width:100%;
    padding:8px;
    border:none;
    border-radius:8px;
    background:#222;
    color:white;
    cursor:pointer;
}

/* KATEGORI */
.categories{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.categories button{
    padding:8px 18px;
    border:none;
    border-radius:20px;
    background:white;
    cursor:pointer;
    font-weight:500;
    transition:0.3s;
}

.categories button.active,
.categories button:hover{
    background:#222;
    color:white;
}

.container{
    display:flex;
    gap:25px;
}

.menu{
    flex:2;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:18px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    transition:0.3s;
    position:relative;
}

.card:hover{
    transform:translateY(-5px);
}

.badge{
    position:absolute;
    top:12px;
    right:12px;
    background:#00b14f;
    color:white;
    padding:3px 8px;
    font-size:12px;
    border-radius:10px;
}

.price{
    color:#00b14f;
    font-weight:600;
    margin-bottom:10px;
}

.card button{
    width:100%;
    padding:8px;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
    margin-top:5px;
}

.add-btn{background:#00b14f}
.edit-btn{background:#2196f3}

.cart{
    flex:1;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    height:fit-content;
}

.cart ul{
    list-style:none;
    margin-bottom:15px;
}

.cart li{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
    font-size:14px;
}

.cart li button{
    background:red;
    border:none;
    color:white;
    border-radius:5px;
    padding:2px 6px;
    cursor:pointer;
}

.checkout-btn{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#ff5722;
    color:white;
    font-weight:600;
    cursor:pointer;
}

@media(max-width:768px){
    .container{flex-direction:column}
}
</style>
</head>

<body>

<h1>🍔 SPPG GUNUNGPRING 001 </h1>

<!-- FORM TAMBAH / EDIT -->
<div class="form-box">
    <h3>Tambah / Edit Menu</h3>
    <input type="hidden" id="editId">
    <input type="text" id="name" placeholder="Nama Makanan">
    <input type="number" id="price" placeholder="Harga">
    <select id="categoryInput">
        <option value="Karbohidrat">Karbohidrat</option>
        <option value="Protein">Protein</option>
        <option value="Minuman">Buah - Buahan</option>
        <option value="Snack">Snack</option>
    </select>
    <button onclick="saveItem()">Simpan Menu</button>
</div>

<!-- KATEGORI -->
<div class="categories">
    <button onclick="filterMenu('All')" class="active">Semua</button>
    <button onclick="filterMenu('Karbohidrat')">Karbohidrat</button>
    <button onclick="filterMenu('Protein')">Protein</button>
    <button onclick="filterMenu('Minuman')">Buah - Buahan</button>
    <button onclick="filterMenu('Snack')">Snack</button>
</div>

<div class="container">
    <div class="menu" id="menu-list"></div>

    <div class="cart">
        <h2>🛒 Keranjang</h2>
        <ul id="cart-list"></ul>
        <div class="total">Total: Rp <span id="total">0</span></div>
        <button class="checkout-btn" onclick="checkout()">Checkout</button>
    </div>
</div>

<script>
let menu = [
    { id: 1, name: "Nasi Putih", price: 8000, category: "Karbohidrat" },
    { id: 2, name: "Nasi Goreng", price: 20000, category: "Karbohidrat" },
    { id: 3, name: "Ayam Geprek", price: 18000, category: "Protein" },
    { id: 4, name: "Telur Dadar", price: 10000, category: "Protein" },
    { id: 5, name: "Es Teh", price: 5000, category: "Minuman" },
    { id: 6, name: "Jus Jeruk", price: 12000, category: "Minuman" },
    { id: 7, name: "Kentang Goreng", price: 15000, category: "Snack" },
    { id: 8, name: "Sosis Bakar", price: 14000, category: "Snack" }
];

let cart = [];
let total = 0;

const menuList = document.getElementById("menu-list");
const cartList = document.getElementById("cart-list");
const totalDisplay = document.getElementById("total");

function displayMenu(items){
    menuList.innerHTML="";
    items.forEach(item=>{
        const card=document.createElement("div");
        card.classList.add("card");
        card.innerHTML=`
            <span class="badge">${item.category}</span>
            <h3>${item.name}</h3>
            <div class="price">Rp ${item.price}</div>
            <button class="add-btn" onclick="addToCart(${item.id})">Tambah</button>
            <button class="edit-btn" onclick="editItem(${item.id})">Edit</button>
        `;
        menuList.appendChild(card);
    });
}

function filterMenu(category){
    document.querySelectorAll(".categories button")
        .forEach(btn=>btn.classList.remove("active"));

    event.target.classList.add("active");

    if(category==="All"){
        displayMenu(menu);
    }else{
        const filtered=menu.filter(item=>item.category===category);
        displayMenu(filtered);
    }
}

function saveItem(){
    const id=document.getElementById("editId").value;
    const name=document.getElementById("name").value;
    const price=parseInt(document.getElementById("price").value);
    const category=document.getElementById("categoryInput").value;

    if(!name || !price){
        alert("Isi semua data!");
        return;
    }

    if(id){
        const item=menu.find(m=>m.id==id);
        item.name=name;
        item.price=price;
        item.category=category;
    }else{
        menu.push({
            id:Date.now(),
            name,
            price,
            category
        });
    }

    document.getElementById("editId").value="";
    document.getElementById("name").value="";
    document.getElementById("price").value="";

    displayMenu(menu);
}

function editItem(id){
    const item=menu.find(m=>m.id===id);
    document.getElementById("editId").value=item.id;
    document.getElementById("name").value=item.name;
    document.getElementById("price").value=item.price;
    document.getElementById("categoryInput").value=item.category;

    window.scrollTo({top:0,behavior:"smooth"});
}

function addToCart(id){
    const item=menu.find(m=>m.id===id);
    cart.push(item);
    total+=item.price;
    renderCart();
}

function renderCart(){
    cartList.innerHTML="";
    cart.forEach((item,index)=>{
        const li=document.createElement("li");
        li.innerHTML=`
            ${item.name}
            <span>
                Rp ${item.price}
                <button onclick="removeItem(${index})">x</button>
            </span>
        `;
        cartList.appendChild(li);
    });
    totalDisplay.textContent=total;
}

function removeItem(index){
    total-=cart[index].price;
    cart.splice(index,1);
    renderCart();
}

function checkout(){
    if(cart.length===0){
        alert("Keranjang masih kosong!");
        return;
    }
    alert("Pesanan berhasil!\nTotal bayar: Rp "+total);
    cart=[];
    total=0;
    renderCart();
}

displayMenu(menu);
</script>

</body>
</html>
